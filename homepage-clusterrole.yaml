apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: homepage
  labels:
    app.kubernetes.io/name: homepage
  namespace: torre-ns
rules:
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
      - list
  - apiGroups:
      - extensions
      - networking.k8s.io
    resources:
      - ingresses
    verbs:
      - get
      - list
  - apiGroups:
      - traefik.io
    resources:
      - ingressroutes
    verbs:
      - get
      - list
  - apiGroups:
      - metrics.k8s.io
    resources:
      - pods
    verbs:
      - get
      - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: homepage
  namespace: torre-ns
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: homepage
subjects:
  - kind: ServiceAccount
    name: homepage
    namespace: torre-ns